openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Between Chapters – Marketing Portfolio API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: survey
    description: Survey operations
  - name: analytics
    description: Analytics operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /survey/responses:
    post:
      operationId: submitSurvey
      tags: [survey]
      summary: Submit a Validation Lab response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SurveyInput"
      responses:
        "201":
          description: Survey submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveyResponse"
        "400":
          description: Validation error

  /survey/analytics:
    get:
      operationId: getSurveyAnalytics
      tags: [analytics]
      summary: Get aggregated Validation Lab analytics
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveyAnalytics"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    SurveyInput:
      type: object
      required:
        - celebrationFrequency
        - recentCelebration
        - monthlyAestheticSpend
        - mostImportantFactor
        - packageChoice
        - biggestFear
        - bookingIntent
      properties:
        celebrationFrequency:
          type: string
          enum: [never, sometimes, often, always]
        recentCelebration:
          type: string
          enum: [birthday, graduation, anniversary, promotion, other]
        monthlyAestheticSpend:
          type: string
          enum: [under_1000, between_1000_3000, between_3000_6000, above_6000]
        mostImportantFactor:
          type: string
          enum: [emotion, aesthetics, price, convenience, photos, personalization]
        switchTriggers:
          type: array
          items:
            type: string
            enum: [unique_styling, emotional_touches, better_photos, less_stress, intimate_experience, custom_themes, social_proof]
        packageChoice:
          type: string
          enum: [moment, story, chapter]
        biggestFear:
          type: string
          enum: [late_execution, looks_cheap, too_expensive, feels_generic, no_personalization]
        perfectCelebration:
          type: ["string", "null"]
        bookingIntent:
          type: string
          enum: [definitely, maybe, probably_not, no]
        respondentAge:
          type: ["string", "null"]
        respondentOccupation:
          type: ["string", "null"]
        respondentCity:
          type: ["string", "null"]

    SurveyResponse:
      type: object
      required:
        - id
        - celebrationFrequency
        - recentCelebration
        - monthlyAestheticSpend
        - mostImportantFactor
        - packageChoice
        - biggestFear
        - bookingIntent
        - submittedAt
      properties:
        id:
          type: integer
        celebrationFrequency:
          type: string
        recentCelebration:
          type: string
        monthlyAestheticSpend:
          type: string
        mostImportantFactor:
          type: string
        switchTriggers:
          type: ["string", "null"]
        packageChoice:
          type: string
        biggestFear:
          type: string
        perfectCelebration:
          type: ["string", "null"]
        bookingIntent:
          type: string
        respondentAge:
          type: ["string", "null"]
        respondentOccupation:
          type: ["string", "null"]
        respondentCity:
          type: ["string", "null"]
        submittedAt:
          type: string

    SurveyAnalytics:
      type: object
      required:
        - totalResponses
        - bookingIntentScore
        - celebrationFrequencyDistribution
        - recentCelebrationDistribution
        - spendDistribution
        - importantFactorDistribution
        - packageChoiceDistribution
        - biggestFearDistribution
        - switchTriggerDistribution
        - bookingIntentDistribution
        - perfectCelebrationWords
      properties:
        totalResponses:
          type: integer
        bookingIntentScore:
          type: number
          description: Weighted 0–100 score (definitely=100, maybe=66, probably_not=33, no=0)
        celebrationFrequencyDistribution:
          type: array
          items:
            $ref: "#/components/schemas/DistributionItem"
        recentCelebrationDistribution:
          type: array
          items:
            $ref: "#/components/schemas/DistributionItem"
        spendDistribution:
          type: array
          items:
            $ref: "#/components/schemas/DistributionItem"
        importantFactorDistribution:
          type: array
          items:
            $ref: "#/components/schemas/DistributionItem"
        packageChoiceDistribution:
          type: array
          items:
            $ref: "#/components/schemas/DistributionItem"
        biggestFearDistribution:
          type: array
          items:
            $ref: "#/components/schemas/DistributionItem"
        switchTriggerDistribution:
          type: array
          items:
            $ref: "#/components/schemas/DistributionItem"
        bookingIntentDistribution:
          type: array
          items:
            $ref: "#/components/schemas/DistributionItem"
        perfectCelebrationWords:
          type: array
          items:
            $ref: "#/components/schemas/WordFrequency"

    DistributionItem:
      type: object
      required: [label, count, percentage]
      properties:
        label:
          type: string
        count:
          type: integer
        percentage:
          type: number

    WordFrequency:
      type: object
      required: [word, count]
      properties:
        word:
          type: string
        count:
          type: integer
